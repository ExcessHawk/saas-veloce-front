<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pensum — Dashboard Director</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'Geist', sans-serif; }

  :root {
    --n-0:   oklch(99.2% 0.003 80);
    --n-50:  oklch(97.5% 0.004 80);
    --n-100: oklch(94.5% 0.006 80);
    --n-200: oklch(89%   0.007 80);
    --n-300: oklch(80%   0.009 80);
    --n-400: oklch(68%   0.010 80);
    --n-500: oklch(55%   0.010 80);
    --n-600: oklch(42%   0.010 80);
    --n-700: oklch(30%   0.009 80);
    --n-800: oklch(20%   0.008 80);
    --n-900: oklch(13%   0.006 80);
    --n-950: oklch(8.5%  0.005 80);

    --s-100: oklch(93% 0.060 150); --s-500: oklch(55% 0.140 150); --s-700: oklch(40% 0.120 150);
    --w-100: oklch(95% 0.060 75);  --w-500: oklch(72% 0.150 72);  --w-700: oklch(52% 0.130 72);
    --d-100: oklch(94% 0.040 25);  --d-500: oklch(58% 0.200 25);  --d-700: oklch(42% 0.180 25);

    --radius-sm: 6px; --radius-md: 10px; --radius-lg: 16px; --radius-xl: 24px; --radius-full: 9999px;
    --shadow-sm: 0 1px 3px oklch(0% 0 0 / 0.08), 0 1px 2px oklch(0% 0 0 / 0.05);
    --shadow-md: 0 4px 6px oklch(0% 0 0 / 0.05), 0 2px 4px oklch(0% 0 0 / 0.06);
    --shadow-lg: 0 10px 15px oklch(0% 0 0 / 0.06), 0 4px 6px oklch(0% 0 0 / 0.05);

    --bg-app:        var(--n-50);
    --bg-base:       var(--n-0);
    --bg-subtle:     var(--n-100);
    --bg-muted:      var(--n-200);
    --border:        var(--n-200);
    --border-strong: var(--n-300);
    --text-primary:  var(--n-950);
    --text-secondary:var(--n-600);
    --text-tertiary: var(--n-400);
    --sidebar-bg:    var(--n-950);
    --sidebar-text:  var(--n-500);
    --sidebar-text-active: var(--n-0);
    --sidebar-active: oklch(99% 0 0 / 0.10);
    --sidebar-hover:  oklch(99% 0 0 / 0.06);
    --accent:        var(--n-950);
    --accent-hover:  var(--n-800);
    --accent-text:   var(--n-0);
  }
  .dark {
    --bg-app:        var(--n-950);
    --bg-base:       var(--n-900);
    --bg-subtle:     var(--n-800);
    --bg-muted:      var(--n-700);
    --border:        var(--n-800);
    --border-strong: var(--n-700);
    --text-primary:  var(--n-50);
    --text-secondary:var(--n-400);
    --text-tertiary: var(--n-600);
    --sidebar-bg:    oklch(8% 0.005 80);
    --sidebar-text:  var(--n-500);
    --sidebar-text-active: var(--n-0);
    --sidebar-active: oklch(99% 0 0 / 0.10);
    --sidebar-hover:  oklch(99% 0 0 / 0.05);
    --accent:        var(--n-100);
    --accent-hover:  var(--n-0);
    --accent-text:   var(--n-950);
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Icons ── */
const Icon = ({ name, size = 16 }) => {
  const p = {
    dashboard:  <><rect x="3" y="3" width="7" height="7" rx="1.2"/><rect x="14" y="3" width="7" height="7" rx="1.2"/><rect x="14" y="14" width="7" height="7" rx="1.2"/><rect x="3" y="14" width="7" height="7" rx="1.2"/></>,
    aulas:      <><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
    materias:   <><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>,
    cursos:     <><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></>,
    anios:      <><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
    miembros:   <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
    escuela:    <><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></>,
    perfil:     <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
    sun:        <><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></>,
    moon:       <><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></>,
    logout:     <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
    bell:       <><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>,
    search:     <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
    plus:       <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    zap:        <><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></>,
    inscripciones:<><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></>,
    eye:        <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
    edit:       <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
    trash:      <><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></>,
    check:      <><polyline points="20 6 9 17 4 12"/></>,
    dot:        <><circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"/></>,
    chevronR:   <><polyline points="9 18 15 12 9 6"/></>,
    trending:   <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      {p[name]}
    </svg>
  );
};

/* ── Nav config ── */
const NAV_DIRECTOR = [
  { icon: "dashboard",   label: "Dashboard",       id: "dashboard"      },
  { icon: "aulas",       label: "Aulas",            id: "aulas"          },
  { icon: "materias",    label: "Materias",         id: "materias"       },
  { icon: "cursos",      label: "Cursos",           id: "cursos"         },
  { icon: "anios",       label: "Años Académicos",  id: "anios"          },
  { icon: "miembros",    label: "Miembros",         id: "miembros"       },
  { icon: "inscripciones", label: "Inscripciones", id: "inscripciones"  },
  { divider: true },
  { icon: "escuela",     label: "Mi Escuela",       id: "escuela"        },
  { icon: "perfil",      label: "Mi Perfil",        id: "perfil"         },
];

const NAV_DOCENTE = [
  { icon: "dashboard", label: "Dashboard",    id: "dashboard" },
  { icon: "cursos",    label: "Mis Cursos",   id: "miscursos" },
  { divider: true },
  { icon: "perfil",    label: "Mi Perfil",    id: "perfil" },
];

const NAV_PADRE = [
  { icon: "dashboard", label: "Dashboard",  id: "dashboard" },
  { icon: "miembros",  label: "Mis Hijos",  id: "mis-hijos" },
  { divider: true },
  { icon: "perfil",    label: "Mi Perfil",  id: "perfil" },
];

const NAV_ESTUDIANTE = [
  { icon: "dashboard", label: "Dashboard",    id: "dashboard" },
  { icon: "cursos",    label: "Mis Cursos",   id: "miscursos-est" },
  { divider: true },
  { icon: "perfil",    label: "Mi Perfil",    id: "perfil" },
];

const NAV = NAV_DIRECTOR; // kept for compatibility

const PAGE_TITLES = {
  dashboard: "Dashboard", aulas: "Aulas", materias: "Materias",
  cursos: "Cursos", anios: "Años Académicos", miembros: "Miembros",
  escuela: "Mi Escuela", perfil: "Mi Perfil",
  miscursos: "Mis Cursos", "miscursos-est": "Mis Cursos", "mis-hijos": "Mis Hijos",
  inscripciones: "Inscripciones",
};

/* ── Sidebar ── */
const Sidebar = ({ active, setActive, role, setSubpage }) => {
  const nav = role === "docente" ? NAV_DOCENTE : role === "estudiante" ? NAV_ESTUDIANTE : role === "padre" ? NAV_PADRE : NAV_DIRECTOR;
  const user = role === "docente"
    ? { initials: "AT", name: "Ana Torres",          rol: "Docente",    grad: "oklch(65% 0.14 150), oklch(58% 0.16 180)" }
    : role === "estudiante"
    ? { initials: "LG", name: "Lucía Garza",         rol: "Estudiante", grad: "oklch(65% 0.14 50),  oklch(58% 0.16 30)"  }
    : role === "padre"
    ? { initials: "MG", name: "Marco Garza",          rol: "Padre",      grad: "oklch(65% 0.14 100), oklch(58% 0.16 130)" }
    : { initials: "RC", name: "Roberto Castellanos", rol: "Director",   grad: "oklch(65% 0.14 260), oklch(58% 0.16 300)" };

  const NavItem = ({ item }) => {
    const isActive = active === item.id;
    const [hov, setHov] = useState(false);
    return (
      <button onClick={() => { setActive(item.id); setSubpage && setSubpage(null); }}
        onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
        style={{
          display: "flex", alignItems: "center", gap: 10,
          width: "100%", padding: "7px 12px",
          borderRadius: "var(--radius-md)", border: "none", cursor: "pointer",
          background: isActive ? "var(--sidebar-active)" : hov ? "var(--sidebar-hover)" : "transparent",
          color: isActive || hov ? "var(--sidebar-text-active)" : "var(--sidebar-text)",
          fontSize: 13.5, fontFamily: "inherit", fontWeight: isActive ? 500 : 400,
          transition: "all 0.1s", textAlign: "left",
        }}>
        <Icon name={item.icon} size={15} />
        <span style={{ flex: 1 }}>{item.label}</span>
        {isActive && <span style={{ width: 5, height: 5, borderRadius: "99px", background: "var(--sidebar-text-active)", opacity: 0.4, flexShrink: 0 }} />}
      </button>
    );
  };

  return (
    <aside style={{
      width: 256, flexShrink: 0, height: "100vh",
      background: "var(--sidebar-bg)",
      display: "flex", flexDirection: "column",
      borderRight: "1px solid oklch(99% 0 0 / 0.06)",
      position: "sticky", top: 0,
    }}>
      {/* Logo */}
      <div style={{ padding: "18px 18px 16px", borderBottom: "1px solid oklch(99% 0 0 / 0.07)", display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{ width: 32, height: 32, borderRadius: "var(--radius-md)", background: "oklch(99% 0 0 / 0.12)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white" stroke="none"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <div>
          <div style={{ fontWeight: 700, fontSize: 15, color: "var(--n-0)", letterSpacing: "-0.03em" }}>Pensum</div>
          <div style={{ fontSize: 10.5, color: "var(--sidebar-text)", marginTop: 1 }}>Colegio Iberoamericano</div>
        </div>
      </div>

      {/* Nav */}
      <nav style={{ flex: 1, padding: "10px 8px", display: "flex", flexDirection: "column", gap: 1, overflowY: "auto" }}>
        {nav.map((item, i) =>
          item.divider
            ? <div key={i} style={{ margin: "8px 0", borderTop: "1px solid oklch(99% 0 0 / 0.07)" }} />
            : <NavItem key={item.id} item={item} />
        )}
      </nav>

      {/* User */}
      <div style={{ margin: 8, padding: "10px 12px", background: "oklch(99% 0 0 / 0.06)", borderRadius: "var(--radius-md)", display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}>
        <div style={{ width: 30, height: 30, borderRadius: "var(--radius-full)", background: `linear-gradient(135deg, ${user.grad})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "white", flexShrink: 0 }}>{user.initials}</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 12.5, fontWeight: 500, color: "var(--n-100)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{user.name}</div>
          <div style={{ fontSize: 10.5, color: "var(--sidebar-text)" }}>{user.rol}</div>
        </div>
        <Icon name="chevronR" size={13} />
      </div>
    </aside>
  );
};

/* ── Header ── */
const Header = ({ dark, setDark }) => {
  const [hovLogout, setHovLogout] = useState(false);
  return (
    <header style={{ height: 54, flexShrink: 0, background: "var(--bg-base)", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", padding: "0 20px", gap: 10, position: "sticky", top: 0, zIndex: 10 }}>
      {/* Search */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 11px", background: "var(--bg-subtle)", border: "1px solid var(--border)", borderRadius: "var(--radius-md)", color: "var(--text-tertiary)", fontSize: 13, cursor: "text", width: 210 }}>
        <Icon name="search" size={13} />
        <span>Buscar…</span>
        <span style={{ marginLeft: "auto", fontSize: 10, padding: "1px 5px", background: "var(--bg-muted)", borderRadius: 4, fontFamily: "'Geist Mono', monospace" }}>⌘K</span>
      </div>

      <div style={{ flex: 1 }} />

      {/* Bell */}
      <button style={{ width: 34, height: 34, borderRadius: "var(--radius-md)", border: "1px solid var(--border)", background: "transparent", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "var(--text-secondary)", position: "relative" }}>
        <Icon name="bell" size={15} />
        <span style={{ position: "absolute", top: 6, right: 6, width: 6, height: 6, borderRadius: "99px", background: "var(--d-500)", border: "1.5px solid var(--bg-base)" }} />
      </button>

      {/* Dark toggle */}
      <button onClick={() => setDark(!dark)} style={{ width: 34, height: 34, borderRadius: "var(--radius-md)", border: "1px solid var(--border)", background: "transparent", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "var(--text-secondary)" }}>
        <Icon name={dark ? "sun" : "moon"} size={15} />
      </button>

      {/* Logout */}
      <button
        onMouseEnter={() => setHovLogout(true)} onMouseLeave={() => setHovLogout(false)}
        style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 12px", border: "1px solid var(--border)", borderRadius: "var(--radius-md)", background: hovLogout ? "var(--bg-subtle)" : "transparent", color: hovLogout ? "var(--text-primary)" : "var(--text-secondary)", fontSize: 13, fontFamily: "inherit", fontWeight: 500, cursor: "pointer", transition: "all 0.1s" }}>
        <Icon name="logout" size={13} />
        Salir
      </button>
    </header>
  );
};

/* ── Primitives ── */
const Card = ({ children, style = {} }) => (
  <div style={{ background: "var(--bg-base)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", boxShadow: "var(--shadow-sm)", ...style }}>
    {children}
  </div>
);

const Badge = ({ children, variant = "default" }) => {
  const v = {
    default: { bg: "var(--bg-subtle)",  color: "var(--text-secondary)" },
    success: { bg: "var(--s-100)",      color: "var(--s-700)" },
    warning: { bg: "var(--w-100)",      color: "var(--w-700)" },
    danger:  { bg: "var(--d-100)",      color: "var(--d-700)" },
    primary: { bg: "var(--n-950)",      color: "var(--n-0)" },
    director:{ bg: "oklch(93% 0.025 250)", color: "oklch(30% 0.06 250)" },
  }[variant] || {};
  return (
    <span style={{ display: "inline-flex", alignItems: "center", padding: "2px 9px", borderRadius: "var(--radius-full)", fontSize: 11.5, fontWeight: 600, background: v.bg, color: v.color, letterSpacing: "0.01em" }}>
      {children}
    </span>
  );
};

const Btn = ({ children, variant = "primary", icon, size = "md", onClick }) => {
  const [hov, setHov] = useState(false);
  const pad = size === "sm" ? "5px 11px" : "7px 15px";
  const fs  = size === "sm" ? 12 : 13;
  const v = {
    primary:  { bg: hov ? "var(--accent-hover)" : "var(--accent)", color: "var(--accent-text)", border: "var(--accent)" },
    secondary:{ bg: hov ? "var(--bg-subtle)" : "var(--bg-base)",   color: "var(--text-primary)", border: "var(--border)" },
    ghost:    { bg: hov ? "var(--bg-subtle)" : "transparent",      color: "var(--text-secondary)", border: "transparent" },
    danger:   { bg: hov ? "var(--d-700)" : "var(--d-500)",         color: "white", border: "transparent" },
  }[variant];
  return (
    <button onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: pad, borderRadius: "var(--radius-md)", border: `1px solid ${v.border}`, background: v.bg, color: v.color, fontSize: fs, fontFamily: "inherit", fontWeight: 500, cursor: "pointer", transition: "all 0.1s" }}>
      {icon && <Icon name={icon} size={fs} />}
      {children}
    </button>
  );
};

/* ── Stat card ── */
const StatCard = ({ label, value, sub, icon, accent }) => (
  <Card style={{ padding: 20 }}>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
      <div style={{ width: 38, height: 38, borderRadius: "var(--radius-md)", background: accent || "var(--bg-subtle)", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--text-secondary)" }}>
        <Icon name={icon} size={17} />
      </div>
    </div>
    <div style={{ fontSize: 30, fontWeight: 700, color: "var(--text-primary)", letterSpacing: "-0.04em", lineHeight: 1 }}>{value}</div>
    <div style={{ fontSize: 13, color: "var(--text-secondary)", marginTop: 6, fontWeight: 500 }}>{label}</div>
    {sub && <div style={{ fontSize: 11.5, color: "var(--s-700)", marginTop: 4 }}>{sub}</div>}
  </Card>
);

/* ── Courses table ── */
const COURSES = [
  { aula: "Aula 3A",  materia: "Matemáticas",  anio: "2024–2025", estado: "Activo" },
  { aula: "Aula 2B",  materia: "Español",       anio: "2024–2025", estado: "Activo" },
  { aula: "Aula 4A",  materia: "Historia",      anio: "2024–2025", estado: "Borrador" },

/* ── Modal shell ── */
const Modal = ({ open, onClose, title, children, width = 480 }) => {
  useEffect(() => {
    if (!open) return;
    const esc = e => e.key === "Escape" && onClose();
    window.addEventListener("keydown", esc);
    return () => window.removeEventListener("keydown", esc);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 1000,
      background: "oklch(0% 0 0 / 0.45)", display: "flex", alignItems: "center", justifyContent: "center",
      backdropFilter: "blur(2px)" }}>
      <div onClick={e => e.stopPropagation()} style={{ width, maxWidth: "calc(100vw - 32px)",
        background: "var(--bg-base)", border: "1px solid var(--border)",
        borderRadius: "var(--radius-xl)", boxShadow: "var(--shadow-lg)",
        display: "flex", flexDirection: "column", overflow: "hidden" }}>
        {/* Header */}
        <div style={{ padding: "18px 24px 16px", borderBottom: "1px solid var(--border)",
          display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span style={{ fontSize: 15, fontWeight: 600, color: "var(--text-primary)" }}>{title}</span>
          <button onClick={onClose} style={{ width: 28, height: 28, borderRadius: "var(--radius-md)",
            border: "1px solid var(--border)", background: "transparent", cursor: "pointer",
            color: "var(--text-tertiary)", display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 16, lineHeight: 1 }}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
};

const SortIcon = ({ col, sortCol, sortDir }) => {
  const active = sortCol === col;
  return (
    <span style={{ display: "inline-flex", flexDirection: "column", gap: 1, marginLeft: 5, opacity: active ? 1 : 0.3 }}>
      <svg width="8" height="5" viewBox="0 0 8 5" fill="currentColor" style={{ opacity: active && sortDir === "asc" ? 1 : 0.4 }}><path d="M4 0L8 5H0L4 0Z"/></svg>
      <svg width="8" height="5" viewBox="0 0 8 5" fill="currentColor" style={{ opacity: active && sortDir === "desc" ? 1 : 0.4 }}><path d="M4 5L0 0H8L4 5Z"/></svg>
    </span>
  );
};

/* ── Form for create/edit ── */
const AulaForm = ({ initial, onSave, onCancel }) => {
  const [nombre, setNombre] = useState(initial?.nombre || "");
  const [nivel,  setNivel]  = useState(initial?.nivel  || NIVELES[0]);
  const [err,    setErr]    = useState({});
  const valid = () => {
    const e = {};
    if (!nombre.trim()) e.nombre = "El nombre es requerido";
    if (nombre.trim().length > 60) e.nombre = "Máximo 60 caracteres";
    return e;
  };
  const submit = () => {
    const e = valid(); setErr(e);
    if (!Object.keys(e).length) onSave({ nombre: nombre.trim(), nivel });
  };
  return (
    <>
      <div style={{ padding: "20px 24px", display: "flex", flexDirection: "column", gap: 16 }}>
        <div>
          <label style={{ display: "block", fontSize: 12.5, fontWeight: 500, color: "var(--text-secondary)", marginBottom: 6 }}>Nombre del aula *</label>
          <Input value={nombre} onChange={v => { setNombre(v); setErr(p => ({ ...p, nombre: "" })); }} placeholder="Ej. Aula 4B" />
          {err.nombre && <div style={{ fontSize: 11.5, color: "var(--d-500)", marginTop: 4 }}>{err.nombre}</div>}
        </div>
        <div>
          <label style={{ display: "block", fontSize: 12.5, fontWeight: 500, color: "var(--text-secondary)", marginBottom: 6 }}>Nivel de grado *</label>
          <Select value={nivel} onChange={setNivel} style={{ width: "100%" }}>
            {NIVELES.map(n => <option key={n} value={n}>{n}</option>)}
          </Select>
        </div>
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "flex-end", gap: 8, background: "var(--bg-subtle)" }}>
        <Btn variant="secondary" onClick={onCancel}>Cancelar</Btn>
        <Btn variant="primary" onClick={submit}>{initial ? "Guardar cambios" : "Crear aula"}</Btn>
      </div>
    </>
  );
};

/* ══ AulasPage ══ */
const AulasPage = () => {
  const [data,      setData]      = useState(AULAS_SEED);
  const [query,     setQuery]     = useState("");
  const [sortCol,   setSortCol]   = useState("nombre");
  const [sortDir,   setSortDir]   = useState("asc");
  const [page,      setPage]      = useState(1);
  const [rowsPerPage,setRowsPerPage] = useState(10);
  const [modalForm, setModalForm] = useState(null); // null | { mode:"create"|"edit", aula? }
  const [deleteTarget, setDeleteTarget] = useState(null);
  const nextId = useRef(data.length + 1);

  /* filter + sort */
  const filtered = data
    .filter(a => a.nombre.toLowerCase().includes(query.toLowerCase()) || a.nivel.toLowerCase().includes(query.toLowerCase()))
    .sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (sortDir === "desc") [va, vb] = [vb, va];
      return va < vb ? -1 : va > vb ? 1 : 0;
    });

  const total    = filtered.length;
  const pageCount= Math.max(1, Math.ceil(total / rowsPerPage));
  const safePage = Math.min(page, pageCount);
  const sliced   = filtered.slice((safePage - 1) * rowsPerPage, safePage * rowsPerPage);
  const from     = total ? (safePage - 1) * rowsPerPage + 1 : 0;
  const to       = Math.min(safePage * rowsPerPage, total);

  const handleSort = col => {
    if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortCol(col); setSortDir("asc"); }
    setPage(1);
  };

  const handleSave = ({ nombre, nivel }) => {
    if (modalForm.mode === "create") {
      const now = new Date().toISOString().slice(0, 10);
      setData(d => [...d, { id: nextId.current++, nombre, nivel, creado: now }]);
    } else {
      setData(d => d.map(a => a.id === modalForm.aula.id ? { ...a, nombre, nivel } : a));
    }
    setModalForm(null);
  };

  const handleDelete = () => {
    setData(d => d.filter(a => a.id !== deleteTarget.id));
    setDeleteTarget(null);
    setPage(1);
  };

  const Th = ({ col, label, w }) => (
    <th onClick={() => handleSort(col)} style={{ padding: "9px 20px", textAlign: "left",
      fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase",
      letterSpacing: "0.06em", cursor: "pointer", userSelect: "none", whiteSpace: "nowrap",
      width: w }}>
      {label}<SortIcon col={col} sortCol={sortCol} sortDir={sortDir} />
    </th>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

      {/* Page header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <h1 style={{ fontSize: 21, fontWeight: 700, color: "var(--text-primary)", letterSpacing: "-0.03em" }}>Aulas</h1>
          <p style={{ fontSize: 13, color: "var(--text-secondary)", marginTop: 4 }}>{data.length} aulas registradas en este ciclo</p>
        </div>
        <Btn variant="primary" icon="plus" onClick={() => setModalForm({ mode: "create" })}>Crear Aula</Btn>
      </div>

      {/* Toolbar */}
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{ position: "relative", flex: 1, maxWidth: 340 }}>
          <span style={{ position: "absolute", left: 11, top: "50%", transform: "translateY(-50%)", color: "var(--text-tertiary)", pointerEvents: "none", display: "flex" }}>
            <Icon name="search" size={14} />
          </span>
          <Input value={query} onChange={v => { setQuery(v); setPage(1); }}
            placeholder="Buscar por nombre o nivel…"
            style={{ paddingLeft: 34, paddingRight: query ? 34 : 11 }} />
          {query && (
            <button onClick={() => { setQuery(""); setPage(1); }} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", border: "none", background: "transparent", color: "var(--text-tertiary)", cursor: "pointer", fontSize: 16, lineHeight: 1, display: "flex", padding: 0 }}>×</button>
          )}
        </div>
      </div>

      {/* Table card */}
      <div style={{ background: "var(--bg-base)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", boxShadow: "var(--shadow-sm)", overflow: "hidden" }}>
        {sliced.length === 0 ? (
          <EmptyState query={query} onCreate={() => setModalForm({ mode: "create" })} />
        ) : (
          <>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead>
                  <tr style={{ background: "var(--bg-subtle)", borderBottom: "1px solid var(--border)" }}>
                    <Th col="nombre" label="Nombre"          w="35%" />
                    <Th col="nivel"  label="Nivel de grado"  w="30%" />
                    <Th col="creado" label="Fecha de creación" w="22%" />
                    <th style={{ padding: "9px 20px", textAlign: "right", fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.06em", width: "13%" }}>Acciones</th>
                  </tr>
                </thead>
                <tbody>
                  {sliced.map((aula, i) => (
                    <tr key={aula.id} style={{ borderTop: i === 0 ? "none" : "1px solid var(--border)", transition: "background 0.08s" }}
                      onMouseEnter={e => e.currentTarget.style.background = "var(--bg-subtle)"}
                      onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                      <td style={{ padding: "13px 20px" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                          <div style={{ width: 32, height: 32, borderRadius: "var(--radius-md)", background: "var(--bg-subtle)", border: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--text-tertiary)", flexShrink: 0 }}>
                            <Icon name="aulas" size={14} />
                          </div>
                          <span style={{ fontSize: 14, fontWeight: 500, color: "var(--text-primary)" }}>{aula.nombre}</span>
                        </div>
                      </td>
                      <td style={{ padding: "13px 20px" }}>
                        <span style={{ fontSize: 13.5, color: "var(--text-secondary)" }}>{aula.nivel}</span>
                      </td>
                      <td style={{ padding: "13px 20px" }}>
                        <span style={{ fontSize: 13, color: "var(--text-tertiary)", fontFamily: "'Geist Mono', monospace" }}>{fmtDate(aula.creado)}</span>
                      </td>
                      <td style={{ padding: "13px 20px" }}>
                        <div style={{ display: "flex", gap: 4, justifyContent: "flex-end" }}>
                          <GhostIconBtn icon="edit"  title="Editar"    onClick={() => setModalForm({ mode: "edit", aula })} />
                          <GhostIconBtn icon="trash" title="Eliminar"  onClick={() => setDeleteTarget(aula)} danger />
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {/* Pagination */}
            <div style={{ padding: "12px 20px", borderTop: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 12, background: "var(--bg-subtle)" }}>
              <span style={{ fontSize: 12.5, color: "var(--text-secondary)", whiteSpace: "nowrap" }}>
                Mostrando {from}–{to} de {total}
              </span>
              <div style={{ flex: 1 }} />
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 12, color: "var(--text-tertiary)" }}>Filas</span>
                <Select value={rowsPerPage} onChange={v => { setRowsPerPage(+v); setPage(1); }} style={{ padding: "4px 8px", fontSize: 12 }}>
                  {[5,10,25,50].map(n => <option key={n} value={n}>{n}</option>)}
                </Select>
              </div>
              <div style={{ display: "flex", gap: 4 }}>
                <PaginBtn onClick={() => setPage(p => Math.max(1, p-1))} disabled={safePage === 1}>‹ Ant</PaginBtn>
                {Array.from({ length: pageCount }, (_, i) => i + 1).filter(p => p === 1 || p === pageCount || Math.abs(p - safePage) <= 1).map((p, i, arr) => (
                  <React.Fragment key={p}>
                    {i > 0 && arr[i-1] !== p - 1 && <span style={{ padding: "0 4px", color: "var(--text-tertiary)", lineHeight: "28px" }}>…</span>}
                    <PaginBtn onClick={() => setPage(p)} active={safePage === p}>{p}</PaginBtn>
                  </React.Fragment>
                ))}
                <PaginBtn onClick={() => setPage(p => Math.min(pageCount, p+1))} disabled={safePage === pageCount}>Sig ›</PaginBtn>
              </div>
            </div>
          </>
        )}
      </div>

      {/* ── Modal: Crear / Editar ── */}
      <Modal open={!!modalForm} onClose={() => setModalForm(null)}
        title={modalForm?.mode === "edit" ? "Editar aula" : "Crear nueva aula"}>
        {modalForm && (
          <AulaForm
            initial={modalForm.mode === "edit" ? modalForm.aula : null}
            onSave={handleSave}
            onCancel={() => setModalForm(null)} />
        )}
      </Modal>

      {/* ── Modal: Confirmar eliminación ── */}
      <Modal open={!!deleteTarget} onClose={() => setDeleteTarget(null)} title="Eliminar aula" width={400}>
        {deleteTarget && (
          <>
            <div style={{ padding: "20px 24px" }}>
              <div style={{ width: 44, height: 44, borderRadius: "var(--radius-lg)", background: "var(--d-100)", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--d-500)", marginBottom: 14 }}>
                <Icon name="trash" size={20} />
              </div>
              <p style={{ fontSize: 14, color: "var(--text-secondary)", lineHeight: 1.6 }}>
                ¿Estás seguro de eliminar el aula <strong style={{ color: "var(--text-primary)" }}>{deleteTarget.nombre}</strong>?
                Esta acción no se puede deshacer y eliminará todos los cursos asociados.
              </p>
            </div>
            <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "flex-end", gap: 8, background: "var(--bg-subtle)" }}>
              <Btn variant="secondary" onClick={() => setDeleteTarget(null)}>Cancelar</Btn>
              <Btn variant="danger" onClick={handleDelete}>Eliminar aula</Btn>
            </div>
          </>
        )}
      </Modal>
    </div>
  );
};

/* ── Ghost icon button ── */
const GhostIconBtn = ({ icon, title, onClick, danger }) => {
  const [hov, setHov] = useState(false);
  return (
    <button title={title} onClick={onClick}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ width: 30, height: 30, borderRadius: "var(--radius-sm)", border: "1px solid transparent",
        background: hov ? (danger ? "var(--d-100)" : "var(--bg-subtle)") : "transparent",
        color: hov ? (danger ? "var(--d-500)" : "var(--text-primary)") : "var(--text-tertiary)",
        display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
        transition: "all 0.1s" }}>
      <Icon name={icon} size={14} />
    </button>
  );
};

/* ── Pagination button ── */
const PaginBtn = ({ children, onClick, disabled, active }) => (
  <button onClick={onClick} disabled={disabled}
    style={{ minWidth: 28, height: 28, padding: "0 6px", borderRadius: "var(--radius-sm)",
      border: "1px solid var(--border)",
      background: active ? "var(--accent)" : "transparent",
      color: active ? "var(--accent-text)" : disabled ? "var(--text-tertiary)" : "var(--text-secondary)",
      fontSize: 12, fontFamily: "inherit", fontWeight: active ? 600 : 400,
      cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.4 : 1,
      transition: "all 0.1s" }}>
    {children}
  </button>
);

};

const fmtLimite = d => {
  const [y,m,day] = d.split("-");
  const mes = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"][+m-1];
  const today = new Date(); const t = new Date(d);
  const diff = Math.ceil((t - today) / 86400000);
  const rel = diff < 0 ? `venció hace ${-diff}d` : diff === 0 ? "vence hoy" : `vence en ${diff}d`;
  return { label: `${+day} ${mes} ${y}`, rel, overdue: diff < 0 };
};

/* ── Tarea Form ── */
const TareaForm = ({ initial, onSave, onCancel }) => {
  const [titulo,  setTitulo]  = useState(initial?.titulo  || "");
  const [desc,    setDesc]    = useState(initial?.desc    || "");
  const [limite,  setLimite]  = useState(initial?.limite  || "");
  const [puntaje, setPuntaje] = useState(initial?.puntaje || 10);
  const [err,     setErr]     = useState({});

  const submit = () => {
    const e = {};
    if (!titulo.trim()) e.titulo = "El título es requerido";
    if (!limite)        e.limite = "La fecha límite es requerida";
    if (puntaje < 1 || puntaje > 100) e.puntaje = "Ingresa un valor entre 1 y 100";
    setErr(e);
    if (!Object.keys(e).length) onSave({ titulo: titulo.trim(), desc: desc.trim(), limite, puntaje: +puntaje });
  };

  const Field = ({ label, error, children }) => (
    <div>
      <label style={{ display:"block", fontSize:12.5, fontWeight:500, color:"var(--text-secondary)", marginBottom:6 }}>{label}</label>
      {children}
      {error && <div style={{ fontSize:11.5, color:"var(--d-500)", marginTop:4 }}>{error}</div>}
    </div>
  );

  return (
    <>
      <div style={{ padding:"20px 24px", display:"flex", flexDirection:"column", gap:16 }}>
        <Field label="Título de la tarea *" error={err.titulo}>
          <Input value={titulo} onChange={v => { setTitulo(v); setErr(p=>({...p,titulo:""})); }} placeholder="Ej. Ejercicios cap. 4" />
        </Field>
        <Field label="Descripción">
          <textarea value={desc} onChange={e => setDesc(e.target.value)} placeholder="Instrucciones para los estudiantes…"
            rows={3} style={{ width:"100%", padding:"7px 11px", fontSize:13.5, fontFamily:"inherit",
              border:"1px solid var(--border)", borderRadius:"var(--radius-md)",
              background:"var(--bg-base)", color:"var(--text-primary)", outline:"none",
              resize:"vertical", lineHeight:1.5 }} />
        </Field>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
          <Field label="Fecha límite *" error={err.limite}>
            <input type="date" value={limite} onChange={e => { setLimite(e.target.value); setErr(p=>({...p,limite:""})); }}
              style={{ width:"100%", padding:"7px 11px", fontSize:13.5, fontFamily:"inherit",
                border:"1px solid var(--border)", borderRadius:"var(--radius-md)",
                background:"var(--bg-base)", color:"var(--text-primary)", outline:"none" }} />
          </Field>
          <Field label="Puntaje máximo" error={err.puntaje}>
            <input type="number" min={1} max={100} value={puntaje} onChange={e => setPuntaje(e.target.value)}
              style={{ width:"100%", padding:"7px 11px", fontSize:13.5, fontFamily:"inherit",
                border:"1px solid var(--border)", borderRadius:"var(--radius-md)",
                background:"var(--bg-base)", color:"var(--text-primary)", outline:"none" }} />
          </Field>
        </div>
      </div>
      <div style={{ padding:"14px 24px", borderTop:"1px solid var(--border)", display:"flex", justifyContent:"flex-end", gap:8, background:"var(--bg-subtle)" }}>
        <Btn variant="secondary" onClick={onCancel}>Cancelar</Btn>
        <Btn variant="primary"   onClick={submit}>{initial ? "Guardar cambios" : "Crear tarea"}</Btn>
      </div>
    </>
  );
};

  const estadoKey = isEstudiante ? "estadoEst" : "estadoDoc";

    const matchQ = t.titulo.toLowerCase().includes(query.toLowerCase());
    if (filter === "todas") return matchQ;

  });

  const handleSave = data => {
    if (modalForm.mode === "create") {
      setTareas(ts => [...ts, { id: nextId.current++, estadoDoc:"Pendiente", estadoEst:"Pendiente", ...data }]);
    } else {
      setTareas(ts => ts.map(t => t.id === modalForm.tarea.id ? { ...t, ...data } : t));
    }
    setModalForm(null);
  };

  const FILTROS_DOC = [["todas","Todas"],["Pendiente","Pendiente"],["Vencida","Vencida"]];
  const FILTROS_EST = [["todas","Todas"],["Pendiente","Pendiente"],["Entregada","Entregada"],["Vencida","Vencida"]];
  const filtros = isEstudiante ? FILTROS_EST : FILTROS_DOC;

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:20 }}>

      {/* Breadcrumb + header */}
      <div>
        <button onClick={onBack} style={{ display:"inline-flex", alignItems:"center", gap:6, fontSize:12.5, color:"var(--text-secondary)", background:"transparent", border:"none", cursor:"pointer", padding:0, marginBottom:10, fontFamily:"inherit" }}

          ← Volver a Mis Cursos

        <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", flexWrap:"wrap", gap:12 }}>
          <div>
            <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
              <h1 style={{ fontSize:21, fontWeight:700, color:"var(--text-primary)", letterSpacing:"-0.03em" }}>Matemáticas — Grupo A</h1>
              <MateriaChip materia="Matemáticas" />
            </div>
            <div style={{ display:"flex", gap:16, marginTop:6 }}>
              <MetaRow icon="aulas"   label="Aula 3A" />
              <MetaRow icon="anios"   label="2024–2025" />
              {isDocente && <MetaRow icon="miembros" label={`${tareas.length} tareas publicadas`} />}
            </div>
          </div>
          {isDocente && <Btn variant="primary" icon="plus" onClick={() => setModalForm({ mode:"create" })}>Nueva Tarea</Btn>}
        </div>
      </div>

          <span style={{ position:"absolute", left:11, top:"50%", transform:"translateY(-50%)", color:"var(--text-tertiary)", pointerEvents:"none", display:"flex" }}>
            <Icon name="search" size={14} />
          </span>
          <Input value={query} onChange={setQuery} placeholder="Buscar tarea…"
            style={{ paddingLeft:34, paddingRight: query ? 32 : 11 }} />
          {query && <button onClick={() => setQuery("")} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", border:"none", background:"transparent", color:"var(--text-tertiary)", cursor:"pointer", fontSize:16, lineHeight:1, display:"flex", padding:0 }}>×</button>}

        <div style={{ display:"flex", background:"var(--bg-subtle)", borderRadius:"var(--radius-md)", padding:3, gap:2 }}>

        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12 }}>

      {/* Modals */}

        {modalForm && <TareaForm initial={modalForm.mode === "edit" ? modalForm.tarea : null} onSave={handleSave} onCancel={() => setModalForm(null)} />}
      </Modal>

      <Modal open={!!deleteT} onClose={() => setDeleteT(null)} title="Eliminar tarea" width={400}>
        {deleteT && (
          <>
            <div style={{ padding:"20px 24px" }}>
              <div style={{ width:44, height:44, borderRadius:"var(--radius-lg)", background:"var(--d-100)", display:"flex", alignItems:"center", justifyContent:"center", color:"var(--d-500)", marginBottom:14 }}>

      {entregarT && <EntregarModal tarea={entregarT} onClose={() => setEntregarT(null)} />}

            {/* Panel header */}
            <div style={{ padding:"16px 20px 14px", borderBottom:"1px solid var(--border)" }}>
              <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:10 }}>
                <div>
                  <div style={{ fontSize:14, fontWeight:700, color:"var(--text-primary)", letterSpacing:"-0.02em" }}>
                    {curso.materia} — {curso.aula}
                  </div>
                  <div style={{ fontSize:12, color:"var(--text-secondary)", marginTop:2 }}>{curso.docente}</div>
                </div>
                <button onClick={() => setSelected(null)}
                  style={{ width:26, height:26, borderRadius:"var(--radius-md)", border:"1px solid var(--border)", background:"transparent", cursor:"pointer", color:"var(--text-tertiary)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, lineHeight:1, flexShrink:0 }}>×</button>
              </div>

              {/* Count badge + bar */}
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
                <span style={{ padding:"3px 10px", borderRadius:"var(--radius-full)", fontSize:12, fontWeight:700,
                  background: listaInscritos.length >= max ? "var(--d-100)" : "var(--s-100)",
                  color: listaInscritos.length >= max ? "var(--d-700)" : "var(--s-700)" }}>
                  {listaInscritos.length} / {max} alumnos
                </span>
                <span style={{ fontSize:11.5, color:"var(--text-tertiary)" }}>{pct}% de capacidad</span>
              </div>
              <div style={{ height:4, borderRadius:99, background:"var(--bg-subtle)" }}>
                <div style={{ height:4, borderRadius:99, width:`${Math.min(pct,100)}%`,
                  background: pct >= 100 ? "var(--d-500)" : mc.color, transition:"width 0.4s" }} />
              </div>
            </div>

            {/* Enrolled list */}
            <div style={{ flex:1, overflowY:"auto", padding:"14px 20px 0" }}>
              <div style={{ fontSize:11.5, fontWeight:600, color:"var(--text-tertiary)", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:8 }}>
                Alumnos inscritos
              </div>

              {/* Search within enrolled */}
              <div style={{ position:"relative", marginBottom:10 }}>
                <span style={{ position:"absolute", left:9, top:"50%", transform:"translateY(-50%)", color:"var(--text-tertiary)", display:"flex" }}><Icon name="search" size={13}/></span>
                <Input value={queryInsc} onChange={setQueryInsc} placeholder="Filtrar inscritos…"
                  style={{ paddingLeft:30, fontSize:12.5 }} />
              </div>

              {listaFiltrada.length === 0
                ? <div style={{ padding:"20px 0", textAlign:"center", color:"var(--text-tertiary)", fontSize:13 }}>
                    {listaInscritos.length === 0 ? "Sin alumnos inscritos aún" : "Sin resultados"}
                  </div>
                : listaFiltrada.map(a => (
                    <AlumnoRow key={a.id} alumno={a} actionLabel="Quitar" actionVariant="danger" onAction={() => quitar(a)} />
                  ))
              }
            </div>

            {/* Add student section */}
            <div style={{ padding:"14px 20px", borderTop:"1px solid var(--border)", background:"var(--bg-subtle)", flexShrink:0 }}>
              <div style={{ fontSize:11.5, fontWeight:600, color:"var(--text-tertiary)", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:8 }}>
                Agregar alumno
              </div>
              <div style={{ position:"relative", marginBottom:busqueda && resultados.length ? 8 : 0 }}>
                <span style={{ position:"absolute", left:9, top:"50%", transform:"translateY(-50%)", color:"var(--text-tertiary)", display:"flex" }}><Icon name="search" size={13}/></span>
                <Input value={busqueda} onChange={setBusqueda} placeholder="Buscar por nombre o email…"
                  style={{ paddingLeft:30, paddingRight: busqueda ? 30 : 9, fontSize:12.5,
                    background:"var(--bg-base)" }} />
                {busqueda && <button onClick={() => setBusqueda("")} style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", border:"none", background:"transparent", color:"var(--text-tertiary)", cursor:"pointer", fontSize:15, lineHeight:1, padding:0 }}>×</button>}
              </div>

              {busqueda.length >= 2 && (
                <div style={{ background:"var(--bg-base)", border:"1px solid var(--border)", borderRadius:"var(--radius-md)", overflow:"hidden" }}>
                  {resultados.length === 0
                    ? <div style={{ padding:"12px 14px", fontSize:12.5, color:"var(--text-tertiary)" }}>Sin resultados</div>
                    : resultados.map((a, i) => (
                        <div key={a.id} style={{ display:"flex", alignItems:"center", gap:9, padding:"8px 12px",
                          borderTop: i > 0 ? "1px solid var(--border)" : "none",
                          transition:"background 0.08s" }}
                          onMouseEnter={e => e.currentTarget.style.background="var(--bg-subtle)"}
                          onMouseLeave={e => e.currentTarget.style.background="transparent"}>
                          <div style={{ width:26, height:26, borderRadius:"var(--radius-full)", background: avatarColor(a.nombre), display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, color:"white", flexShrink:0 }}>
                            {initials(a.nombre)}
                          </div>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontSize:13, fontWeight:500, color:"var(--text-primary)" }}>{a.nombre}</div>
                            <div style={{ fontSize:11, color:"var(--text-tertiary)" }}>{a.email}</div>
                          </div>
                          <Btn variant="primary" size="sm"
                            onClick={() => listaInscritos.length < max && inscribir(a)}>
                            Inscribir
                          </Btn>
                        </div>
                      ))
                  }
                </div>
              )}

              {listaInscritos.length >= max && (
                <div style={{ marginTop:8, padding:"8px 12px", background:"var(--d-100)", borderRadius:"var(--radius-md)", fontSize:12, color:"var(--d-700)", fontWeight:500 }}>
                  El curso está lleno ({max}/{max}). Quita alumnos para agregar nuevos.
                </div>
              )}
            </div>
          </div>
        )}
      </div>

      <AsignarDocenteModal open={!!asignarCurso} onClose={() => setAsignarCurso(null)} curso={asignarCurso} />
    </div>
  );
};

const AsignarDocenteModal = ({ open, onClose, curso }) => {
  const [docenteActual, setDocenteActual] = useState(() =>
    DOCENTES_LIST.find(d => curso && d.nombre.includes(curso.docente.replace("Prof. ",""))) || DOCENTES_LIST[0]
  );
  const [query,    setQuery]    = useState("");
  const [saved,    setSaved]    = useState(false);
  const [pending,  setPending]  = useState(null); // docente to assign

  useEffect(() => {
    if (!open) { setQuery(""); setSaved(false); setPending(null); }
    if (open && curso) {
      setDocenteActual(DOCENTES_LIST.find(d => d.nombre.includes(curso.docente.replace("Prof. ",""))) || null);
    }
  }, [open, curso]);

  const disponibles = DOCENTES_LIST.filter(d =>
    d.id !== docenteActual?.id &&
    (d.nombre.toLowerCase().includes(query.toLowerCase()) ||
     d.especialidad.toLowerCase().includes(query.toLowerCase()) ||
     d.email.toLowerCase().includes(query.toLowerCase()))
  );

  const handleAsignar = d => { setPending(d); };
  const handleGuardar = () => { if (pending) setDocenteActual(pending); setSaved(true); setTimeout(() => { setSaved(false); setPending(null); onClose(); }, 900); };

  if (!open || !curso) return null;

  const mc = MATERIA_COLORS[curso.materia] || { bg:"var(--bg-subtle)", color:"var(--text-secondary)" };

  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, zIndex:1000, background:"oklch(0% 0 0 / 0.45)", display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(2px)" }}>
      <div onClick={e => e.stopPropagation()} style={{ width:520, maxWidth:"calc(100vw - 32px)", maxHeight:"90vh", background:"var(--bg-base)", border:"1px solid var(--border)", borderRadius:"var(--radius-xl)", boxShadow:"var(--shadow-lg)", display:"flex", flexDirection:"column", overflow:"hidden" }}>

        {/* Header */}
        <div style={{ padding:"18px 24px 16px", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>
          <div>
            <div style={{ fontSize:15, fontWeight:700, color:"var(--text-primary)", letterSpacing:"-0.02em" }}>
              Asignar Docente
            </div>
            <div style={{ fontSize:13, color:"var(--text-secondary)", marginTop:2 }}>
              {curso.materia} — {curso.aula}
            </div>
          </div>
          <button onClick={onClose} style={{ width:28, height:28, borderRadius:"var(--radius-md)", border:"1px solid var(--border)", background:"transparent", cursor:"pointer", color:"var(--text-tertiary)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, lineHeight:1 }}>×</button>
        </div>

        {/* Body */}
        <div style={{ flex:1, overflowY:"auto" }}>

          {/* Course info chips */}
          <div style={{ padding:"14px 24px 0", display:"flex", flexWrap:"wrap", gap:8 }}>
            {[
              { icon:"materias", label: curso.materia },
              { icon:"aulas",    label: curso.aula    },
              { icon:"anios",    label: "2024–2025"   },
            ].map(chip => (
              <div key={chip.label} style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"4px 10px", borderRadius:"var(--radius-full)", background:"var(--bg-subtle)", border:"1px solid var(--border)", fontSize:12.5, color:"var(--text-secondary)" }}>
                <Icon name={chip.icon} size={12} />
                {chip.label}
              </div>
            ))}
          </div>

          {/* Docente actual */}
          <div style={{ padding:"16px 24px 0" }}>
            <div style={{ fontSize:11.5, fontWeight:600, color:"var(--text-tertiary)", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:10 }}>Docente actual</div>

            {docenteActual ? (
              <div style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px", background:"var(--bg-subtle)", border:"1px solid var(--border)", borderRadius:"var(--radius-lg)" }}>
                <div style={{ width:40, height:40, borderRadius:"var(--radius-full)", background: avatarColor(docenteActual.nombre), display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:700, color:"white", flexShrink:0 }}>
                  {initials(docenteActual.nombre)}
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:14, fontWeight:600, color:"var(--text-primary)" }}>{docenteActual.nombre}</div>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:3 }}>
                    <span style={{ padding:"1px 8px", borderRadius:"var(--radius-full)", fontSize:11, fontWeight:600, background:"oklch(90% 0.035 200)", color:"oklch(30% 0.07 200)" }}>Docente</span>
                    <span style={{ fontSize:11.5, color:"var(--text-tertiary)" }}>{docenteActual.cursos} cursos activos</span>
                  </div>
                </div>
                <button onClick={() => setDocenteActual(null)}
                  style={{ padding:"5px 12px", borderRadius:"var(--radius-md)", border:"1px solid var(--d-500)", background:"transparent", color:"var(--d-500)", fontSize:12, fontFamily:"inherit", fontWeight:500, cursor:"pointer", whiteSpace:"nowrap", transition:"all 0.1s" }}
                  onMouseEnter={e => { e.currentTarget.style.background="var(--d-100)"; }}
                  onMouseLeave={e => { e.currentTarget.style.background="transparent"; }}>
                  Quitar asignación
                </button>
              </div>
            ) : (
              <div style={{ padding:"14px", background:"var(--w-100)", border:"1px dashed var(--w-500)", borderRadius:"var(--radius-lg)", fontSize:13, color:"var(--w-700)", display:"flex", alignItems:"center", gap:8 }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                Este curso no tiene docente asignado
              </div>
            )}
          </div>

          {/* Pending preview */}
          {pending && (
            <div style={{ margin:"14px 24px 0", padding:"10px 14px", background:`${mc.bg}`, border:`1px solid ${mc.color}44`, borderRadius:"var(--radius-lg)", display:"flex", alignItems:"center", gap:10 }}>
              <Icon name="check" size={14} />
              <span style={{ fontSize:13, color:mc.color, fontWeight:500 }}>
                Se asignará a <strong>{pending.nombre}</strong> al guardar
              </span>
              <button onClick={() => setPending(null)} style={{ marginLeft:"auto", border:"none", background:"transparent", color:mc.color, cursor:"pointer", fontSize:14 }}>×</button>
            </div>
          )}

          {/* Search docentes */}
          <div style={{ padding:"16px 24px 0" }}>
            <div style={{ fontSize:11.5, fontWeight:600, color:"var(--text-tertiary)", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:10 }}>Asignar nuevo docente</div>
            <div style={{ position:"relative", marginBottom:12 }}>
              <span style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:"var(--text-tertiary)", display:"flex" }}><Icon name="search" size={14}/></span>
              <Input value={query} onChange={setQuery} placeholder="Buscar docente por nombre, especialidad…"
                style={{ paddingLeft:32, paddingRight: query ? 32 : 11 }} />
              {query && <button onClick={() => setQuery("")} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", border:"none", background:"transparent", color:"var(--text-tertiary)", cursor:"pointer", fontSize:16, lineHeight:1, padding:0 }}>×</button>}
            </div>

            {/* Docentes list */}
            <div style={{ border:"1px solid var(--border)", borderRadius:"var(--radius-lg)", overflow:"hidden", marginBottom:6 }}>
              {disponibles.length === 0 ? (
                <div style={{ padding:"20px", textAlign:"center", color:"var(--text-tertiary)", fontSize:13 }}>
                  {query ? "Sin resultados para tu búsqueda" : "Todos los docentes ya están asignados"}
                </div>
              ) : disponibles.map((d, i) => {
                const isPending = pending?.id === d.id;
                return (
                  <div key={d.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"11px 14px", borderTop: i > 0 ? "1px solid var(--border)" : "none", background: isPending ? "var(--bg-subtle)" : "transparent", transition:"background 0.08s" }}
                    onMouseEnter={e => { if (!isPending) e.currentTarget.style.background="var(--bg-subtle)"; }}
                    onMouseLeave={e => { if (!isPending) e.currentTarget.style.background="transparent"; }}>
                    <div style={{ width:34, height:34, borderRadius:"var(--radius-full)", background: avatarColor(d.nombre), display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:700, color:"white", flexShrink:0 }}>
                      {initials(d.nombre)}
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:13.5, fontWeight:500, color:"var(--text-primary)" }}>{d.nombre}</div>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:2 }}>
                        <span style={{ fontSize:11.5, color:"var(--text-tertiary)" }}>{d.especialidad}</span>
                        <span style={{ width:3, height:3, borderRadius:"99px", background:"var(--text-tertiary)" }} />
                        <span style={{ fontSize:11.5, color: d.cursos === 0 ? "var(--s-700)" : "var(--text-tertiary)" }}>
                          {d.cursos === 0 ? "Sin cursos" : `${d.cursos} curso${d.cursos>1?"s":""}`}
                        </span>
                      </div>
                    </div>
                    <button onClick={() => handleAsignar(d)}
                      style={{ padding:"5px 14px", borderRadius:"var(--radius-md)",
                        border: isPending ? "1px solid transparent" : "1px solid var(--border)",
                        background: isPending ? mc.color : "transparent",
                        color: isPending ? "white" : "var(--text-secondary)",
                        fontSize:12.5, fontFamily:"inherit", fontWeight:500, cursor:"pointer",
                        transition:"all 0.1s", whiteSpace:"nowrap" }}
                      onMouseEnter={e => { if (!isPending) { e.currentTarget.style.background="var(--bg-subtle)"; e.currentTarget.style.color="var(--text-primary)"; }}}
                      onMouseLeave={e => { if (!isPending) { e.currentTarget.style.background="transparent"; e.currentTarget.style.color="var(--text-secondary)"; }}}>
                      {isPending ? "✓ Seleccionado" : "Asignar"}
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* Footer */}
        <div style={{ padding:"14px 24px", borderTop:"1px solid var(--border)", display:"flex", justifyContent:"flex-end", gap:8, background:"var(--bg-subtle)", flexShrink:0 }}>
          <Btn variant="secondary" onClick={onClose}>Cancelar</Btn>
          <Btn variant="primary" onClick={handleGuardar}>
            {saved ? "✓ Guardado" : "Guardar asignación"}
          </Btn>
        </div>
      </div>
    </div>
  );
};

/* ── App ── */
const App = () => {
  const [dark, setDark] = useState(() => { try { return localStorage.getItem("pensum_dark") === "true"; } catch { return false; } });
  const [role, setRole] = useState(() => { try { return localStorage.getItem("pensum_role") || "director"; } catch { return "director"; } });
  const [active, setActive] = useState(() => { try { return localStorage.getItem("pensum_page") || "dashboard"; } catch { return "dashboard"; } });
  const [subpage, setSubpage] = useState(null); // "tareas" | null
  const [tweaksOpen, setTweaksOpen] = useState(false);

  // When role changes, reset to dashboard and persist
  const switchRole = r => {
    setRole(r);
    setSubpage(null);
    const landing = r === "estudiante" ? "miscursos-est" : r === "docente" ? "miscursos" : r === "padre" ? "dashboard" : "dashboard";
    setActive(landing);
    try { localStorage.setItem("pensum_role", r); localStorage.setItem("pensum_page", landing); } catch {}
  };

  useEffect(() => {
    document.documentElement.classList.toggle("dark", dark);
    try { localStorage.setItem("pensum_dark", dark); } catch {}
  }, [dark]);

  useEffect(() => {
    try { localStorage.setItem("pensum_page", active); } catch {}
  }, [active]);

  useEffect(() => {
    window.addEventListener("message", e => {
      if (e.data?.type === "__activate_edit_mode")  setTweaksOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
    });
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
  }, []);

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"contentPadding": "sm", "tableRows": 6, "darkMode": false}/*EDITMODE-END*/;  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const applyTweak = (k, v) => {
    setTweaks(t => ({ ...t, [k]: v }));
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
  };
  const padMap = { sm: 16, md: 28, lg: 40 };
  const pad = padMap[tweaks.contentPadding] ?? 16;

  return (
    <div style={{ display: "flex", height: "100vh", background: "var(--bg-app)", overflow: "hidden" }}>
      <Sidebar active={active} setActive={setActive} role={role} setSubpage={setSubpage} />

      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", minWidth: 0 }}>
        <Header dark={dark} setDark={setDark} />

        <main style={{ flex: 1, overflowY: "auto", padding: pad }}>
          {subpage === "tareas" ? <TareasPage role={role} onBack={() => setSubpage(null)} />
            : active === "dashboard" ? (role === "padre" ? <PadreDashboardPage /> : <DashboardPage setActive={setActive} />)
            : active === "aulas" ? <AulasPage />
            : active === "miscursos" ? <MisCursosPage onVerTareas={() => setSubpage("tareas")} />
            : active === "miscursos-est" ? <MisCursosEstudiantePage onVerTareas={() => setSubpage("tareas")} />
            : active === "mis-hijos" ? <PadreDashboardPage />
            : active === "inscripciones" ? <InscripcionesPage />
            : <PlaceholderPage id={active} />}
        </main>
      </div>

      {/* Tweaks panel */}
      {tweaksOpen && (
        <div style={{ position: "fixed", bottom: 18, right: 18, zIndex: 200, background: "var(--bg-base)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", boxShadow: "var(--shadow-lg)", padding: 20, width: 252 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text-primary)", marginBottom: 16 }}>Tweaks</div>

          <div style={{ fontSize: 11.5, color: "var(--text-secondary)", marginBottom: 7, fontWeight: 500 }}>Rol de usuario</div>
          <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
            {[{l:"Director", v:"director"},{l:"Docente", v:"docente"},{l:"Estudiante", v:"estudiante"},{l:"Padre", v:"padre"}].map(({ l, v }) => (
              <button key={v} onClick={() => switchRole(v)} style={{ flex: 1, padding: "5px 0", borderRadius: "var(--radius-sm)", border: "1px solid var(--border)", background: role === v ? "var(--accent)" : "transparent", color: role === v ? "var(--accent-text)" : "var(--text-secondary)", fontSize: 12, fontFamily: "inherit", fontWeight: 500, cursor: "pointer" }}>{l}</button>
            ))}
          </div>

          <div style={{ fontSize: 11.5, color: "var(--text-secondary)", marginBottom: 7, fontWeight: 500 }}>Padding de contenido</div>
          <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
            {["sm","md","lg"].map(v => (
              <button key={v} onClick={() => applyTweak("contentPadding", v)} style={{ flex: 1, padding: "5px 0", borderRadius: "var(--radius-sm)", border: "1px solid var(--border)", background: tweaks.contentPadding === v ? "var(--accent)" : "transparent", color: tweaks.contentPadding === v ? "var(--accent-text)" : "var(--text-secondary)", fontSize: 12, fontFamily: "inherit", fontWeight: 500, cursor: "pointer" }}>{v}</button>
            ))}
          </div>

          <div style={{ fontSize: 11.5, color: "var(--text-secondary)", marginBottom: 7, fontWeight: 500 }}>Modo</div>
          <div style={{ display: "flex", gap: 6 }}>
            {[{l:"Claro", v: false},{l:"Oscuro", v: true}].map(({ l, v }) => (
              <button key={l} onClick={() => { setDark(v); applyTweak("darkMode", v); }} style={{ flex: 1, padding: "5px 0", borderRadius: "var(--radius-sm)", border: "1px solid var(--border)", background: dark === v ? "var(--accent)" : "transparent", color: dark === v ? "var(--accent-text)" : "var(--text-secondary)", fontSize: 12, fontFamily: "inherit", fontWeight: 500, cursor: "pointer" }}>{l}</button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
